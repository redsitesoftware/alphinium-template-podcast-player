    <style id="expo-reset">
      /* React Native Web requires explicit heights on the parent chain for flex:1 to work */
      html { height: 100%; margin: 0; padding: 0; }
      body { height: 100%; margin: 0; padding: 0; background-color: #08060F; }
      #root { height: 100%; display: flex; flex-direction: column; }
      /* Hide Alphinium banner on /stream route (broadcast/OBS mode) */
      body.stream-mode #alphinium-banner { display: none !important; }

      /* Alphinium marketplace banner */
      #alphinium-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        padding: 8px 16px;
        box-shadow: 0 -2px 12px rgba(0,0,0,0.25);
      }
      #alphinium-banner a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 700;
        transition: color 0.2s;
      }
      #alphinium-banner a:hover { color: #93c5fd; }
      #alphinium-banner .sep { opacity: 0.4; margin: 0 4px; }
      #alphinium-banner .close-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        color: #9ca3af;
        font-size: 16px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }
      #alphinium-banner .close-btn:hover { color: #fff; }
    </style>
